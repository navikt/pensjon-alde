name: Build and deploy

on:
  push:
    branches:
      - "main"

jobs:
  build:
    name: "build"
    permissions:
      contents: "read"
      id-token: "write"
      packages: "write"
    runs-on: "ubuntu-latest"
    outputs:
      image: "${{ steps.docker-push.outputs.image }}"
      telemetry: "${{ steps.docker-push.outputs.telemetry }}"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: '11.8.0'
      - uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:ci
      - run: pnpm run build
      - run: pnpm prune --prod
      - uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0 
        id: docker-push
        with:
          team: pensjon-saksbehandling

  deploy:
    permissions:
      contents: "read"
      id-token: "write"
    if: github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: 'ubuntu-latest'

    strategy:
      matrix:
        include:
          -  vars_file: vars-q2.yaml
             cluster: dev-gcp
          -  vars_file: prod.yaml
             cluster: prod-gcp

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
        name: "deploy"
        env:
          CLUSTER: '${{ matrix.cluster }}'
          IMAGE: "${{ needs.build.outputs.image }}"
          RESOURCE: .nais/nais.yaml,.nais/unleash-apitoken.yaml
          TELEMETRY: ${{ needs.build.outputs.telemetry }}
          VARS: '.nais/${{ matrix.vars_file }}'
